<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Churn Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg">
                    <div class="card-header bg-dark text-white text-center">
                        <h2>FinTech Customer Churn AI</h2>
                    </div>
                    <div class="card-body">
                        
                        {% if results %}
                            <div class="alert alert-info text-center fs-4 fw-bold" role="alert">
                                {{ results }}
                            </div>
                        {% endif %}

                        <form action="/predict" method="POST">
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Credit Score</label>
                                    <input type="number" class="form-control" name="credit_score" required min="300" max="850">
                                </div>
                                <div class="col">
                                    <label class="form-label">Age</label>
                                    <input type="number" class="form-control" name="age" required min="18" max="100">
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Country</label>
                                    <select class="form-select" name="country" required>
                                        <option value="France">France</option>
                                        <option value="Germany">Germany</option>
                                        <option value="Spain">Spain</option>
                                    </select>
                                </div>
                                <div class="col">
                                    <label class="form-label">Gender</label>
                                    <select class="form-select" name="gender" required>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Tenure (Years at Bank)</label>
                                    <input type="number" class="form-control" name="tenure" required min="0" max="10">
                                </div>
                                <div class="col">
                                    <label class="form-label">Bank Balance ($)</label>
                                    <input type="number" step="0.01" class="form-control" name="balance" required min="0">
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Number of Products</label>
                                    <input type="number" class="form-control" name="products_number" required min="1" max="4">
                                </div>
                                <div class="col">
                                    <label class="form-label">Estimated Salary ($)</label>
                                    <input type="number" step="0.01" class="form-control" name="estimated_salary" required min="0">
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col">
                                    <label class="form-label">Has Credit Card?</label>
                                    <select class="form-select" name="credit_card" required>
                                        <option value="1">Yes (1)</option>
                                        <option value="0">No (0)</option>
                                    </select>
                                </div>
                                <div class="col">
                                    <label class="form-label">Is Active Member?</label>
                                    <select class="form-select" name="active_member" required>
                                        <option value="1">Yes (1)</option>
                                        <option value="0">No (0)</option>
                                    </select>
                                </div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Run Prediction AI</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
